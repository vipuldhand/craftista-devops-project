apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: catalogue
spec:
  serviceName: "catalogue-service"
  replicas: 2
  selector:
    matchLabels:
      app: catalogue
  template:
    metadata:
      labels:
        app: catalogue
    spec:
      containers:
      - name: catalogue
        image: vipuldhand/catalogue:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: catalogue-storage
          mountPath: /app/data
      resources:
        limits:
          memory: "256Mi"
          cpu: "200m"
        requests:
          memory: "128Mi"
  volumeClaimTemplates:
    - metadata:
        name: catalogue-storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 1Gi