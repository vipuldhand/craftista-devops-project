# Source: craftista-chart/templates/analysis-template.yaml
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate-check
spec:
  metrics:
    - name: success-rate
      interval: 30s
      successCondition: result[0] < 1
      failureLimit: 2
      provider:
        prometheus:
          address: http://kube-prometheus-kube-prometheus:9090
          query: |
            sum(rate(container_cpu_usage_seconds_total{namespace="default"}[1m]))
---
# Source: craftista-chart/templates/frontend-deployment.yaml
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: craftista-frontend
spec:
  replicas: 1

  selector:
    matchLabels:
      app: craftista-frontend

  template:
    metadata:
      labels:
        app: craftista-frontend

    spec:
      containers:
        - name: frontend
          image: vipuldhand/frontend:96628f7be04d5a266d654a283c5b85ac8fe6fa05
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          resources:
            limits:
              memory: "256Mi"
              cpu: "200m"
            requests:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: frontend-config-volume
              mountPath: /app/config.json
              subPath: config.json
      volumes:
        - name: frontend-config-volume
          configMap:
            name: craftista-frontend-config
  strategy:
          canary:
            stableService: craftista-frontend-stable
            canaryService: craftista-frontend-canary
            steps:
              - setWeight: 20
              - pause: { duration: 20s }
              - setWeight: 50
              - pause: { duration: 20s }
              - setWeight: 100
            analysis:
              templates:
                - templateName: success-rate-check
