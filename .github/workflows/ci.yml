name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [frontend, catalogue, recommendation, voting]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Show project structure (debug)
        run: ls -R

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          docker build \
           -t vipuldhand/${{ matrix.service }}:latest \
           -t vipuldhand/${{ matrix.service }}:${{ github.sha }} \
           .

          docker push vipuldhand/${{ matrix.service }}:latest
          docker push vipuldhand/${{ matrix.service }}:${{ github.sha }}