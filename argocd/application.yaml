apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: craftista
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/vipuldhand/craftista-devops-project.git
    targetRevision: main
    path: helm/craftista-chart

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true