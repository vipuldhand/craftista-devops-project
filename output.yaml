# Source: craftista-chart/templates/catalogue-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: craftista-catalogue
spec:
  replicas: 1

  selector:
    matchLabels:
      app: craftista-catalogue

  template:
    metadata:
      labels:
        app: craftista-catalogue

    spec:
      containers:
        - name: catalogue
          image: vipuldhand/frontend:96628f7be04d5a266d654a283c5b85ac8fe6fa05
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          resources:
            limits:
              memory: "256Mi"
              cpu: "200m"
            requests:
              memory: "128Mi"
              cpu: "100m"
