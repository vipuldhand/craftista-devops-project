apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend-stable
spec:
  type: {{ .Values.frontend.serviceType }}
  selector:
    app: {{ .Release.Name }}-frontend
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend-canary
spec:
  type: {{ .Values.frontend.serviceType }}
  selector:
    app: {{ .Release.Name }}-frontend
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}