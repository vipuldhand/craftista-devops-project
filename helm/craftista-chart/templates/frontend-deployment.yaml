apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Release.Name }}-frontend
spec:
  replicas: {{ .Values.frontend.replicas }}

  selector:
    matchLabels:
      app: {{ .Release.Name }}-frontend

  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-frontend

    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image }}
          imagePullPolicy: Always

          ports:
            - containerPort: {{ .Values.frontend.port }}

          resources:
            limits:
              memory: "256Mi"
              cpu: "200m"
            requests:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: frontend-config-volume
              mountPath: /app/config.json
              subPath: config.json
      volumes:
        - name: frontend-config-volume
          configMap:
            name: {{ .Release.Name }}-frontend-config
strategy:
        canary:
          stableService: {{ .Release.Name }}-frontend-stable
          canaryService: {{ .Release.Name }}-frontend-canary
          steps:
            - setWeight: 20
            - pause: { duration: 20s }
            - setWeight: 50
            - pause: { duration: 20s }
            - setWeight: 100                      