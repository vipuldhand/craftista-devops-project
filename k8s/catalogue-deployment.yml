apiVersion: apps/v1
kind: Deployment

metadata:
  name: catalogue
  labels:
    app: catalogue

spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalogue

  template:
    metadata:
      labels:
        app: catalogue

    spec:
      containers:
      - name: catalogue
        image: vipuldhand/catalogue:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
      resources:
        limits:
          memory: "256Mi"
          cpu: "200m"
        requests:
          memory: "128Mi"
          cpu: "100m"